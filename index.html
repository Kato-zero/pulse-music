<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="description" content="Pulse Music - Your modern offline music player" />
  
  <title>Pulse Music | Offline Player</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #22c55e;
      --primary-dark: #16a34a;
      --bg-dark: #09090b;
      --bg-card: rgba(255, 255, 255, 0.05);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --border-color: rgba(255, 255, 255, 0.08);
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.3);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #09090b 50%, #0f172a 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 800px;
      margin: 0 auto;
      padding-bottom: 200px;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px) saturate(180%);
      background: rgba(9, 9, 11, 0.8);
      border-bottom: 1px solid var(--border-color);
      padding: env(safe-area-inset-top) 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .brand span {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .folder-btn {
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 8px 25px rgba(34, 197, 94, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .folder-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(34, 197, 94, 0.4);
    }

    .folder-btn:active {
      transform: translateY(0);
    }

    .hero {
      padding: 24px 20px 12px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), var(--bg-card));
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 32px 24px;
      backdrop-filter: blur(10px);
      transition: var(--transition);
    }

    .hero-card:hover {
      border-color: rgba(34, 197, 94, 0.2);
    }

    .hero-card::before {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.15), transparent);
      border-radius: 50%;
      top: -60px;
      right: -60px;
    }

    .hero-card h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      position: relative;
      z-index: 2;
      letter-spacing: -0.5px;
    }

    .hero-card p {
      opacity: 0.8;
      line-height: 1.6;
      position: relative;
      z-index: 2;
      font-size: 0.95rem;
    }

    .playlist-header {
      padding: 24px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .playlist-title {
      font-size: 1.1rem;
      font-weight: 600;
      opacity: 0.8;
    }

    .song-count {
      font-size: 0.85rem;
      opacity: 0.5;
    }

    .playlist {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .song {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .song:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateX(4px);
    }

    .song:active {
      transform: scale(0.98);
    }

    .song.active {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.08));
      border-color: rgba(34, 197, 94, 0.3);
    }

    .song.active::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--primary);
    }

    .art {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .song.active .art::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
    }

    .song-info {
      flex: 1;
      overflow: hidden;
    }

    .song-name {
      font-size: 0.95rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .song-sub {
      font-size: 0.8rem;
      opacity: 0.5;
    }

    .song-play {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .song-play:hover {
      background: var(--primary);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.5;
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
    }

    .empty-state p {
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
      backdrop-filter: blur(25px) saturate(180%);
      background: rgba(9, 9, 11, 0.85);
      border-top: 1px solid var(--border-color);
      box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .player-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .player-cover {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      box-shadow: 0 8px 25px rgba(34, 197, 94, 0.25);
      flex-shrink: 0;
    }

    .player-info {
      flex: 1;
      overflow: hidden;
    }

    .now-title {
      font-size: 1.05rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .playing {
      color: var(--primary);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .progress-wrap {
      margin-top: 20px;
    }

    .progress {
      width: 100%;
      height: 4px;
      appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .progress::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      border: 3px solid white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .progress::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      border: 3px solid white;
    }

    .time {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      opacity: 0.6;
      font-weight: 500;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .control {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    .control:active {
      transform: scale(0.95);
    }

    .main-btn {
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      font-size: 1.4rem;
      box-shadow: 0 10px 30px rgba(34, 197, 94, 0.35);
    }

    .main-btn:hover {
      box-shadow: 0 15px 40px rgba(34, 197, 94, 0.45);
      transform: scale(1.1);
    }

    @media (max-width: 480px) {
      .hero-card h2 {
        font-size: 1.6rem;
      }
      
      .player {
        padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>🎵 Pulse Music</h1>
        <span>Your offline music player</span>
      </div>
      
      <button class="folder-btn" id="pickFolder" title="Open music folder" aria-label="Open music folder">
        <i class="fa-solid fa-folder-open"></i>
      </button>
    </header>

    <section class="hero">
      <div class="hero-card">
        <h2>Feel The Music</h2>
        <p>Select your music folder and enjoy a smooth, modern offline listening experience.</p>
      </div>
    </section>

    <div class="playlist-header">
      <h3 class="playlist-title">Your Music</h3>
      <span class="song-count" id="songCount"></span>
    </div>

    <div class="playlist" id="playlist">
      <div class="empty-state">
        <i class="fa-solid fa-music"></i>
        <p>No music loaded yet.<br>Tap the folder button above to get started.</p>
      </div>
    </div>
  </div>

  <footer class="player" id="player">
    <div class="player-top">
      <div class="player-cover">
        <i class="fa-solid fa-music"></i>
      </div>
      
      <div class="player-info">
        <div class="now-title" id="nowTitle">Nothing Playing</div>
        <div class="playing">Offline Player</div>
      </div>
    </div>

    <div class="progress-wrap">
      <input type="range" value="0" min="0" max="100" class="progress" id="progress" aria-label="Seek through track" />
      <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="control" id="prevBtn" title="Previous track" aria-label="Previous track">
        <i class="fa-solid fa-backward-step"></i>
      </button>
      
      <button class="control main-btn" id="playBtn" title="Play/Pause" aria-label="Play or pause">
        <i class="fa-solid fa-play"></i>
      </button>
      
      <button class="control" id="nextBtn" title="Next track" aria-label="Next track">
        <i class="fa-solid fa-forward-step"></i>
      </button>
    </div>
  </footer>

  <audio id="audio" preload="metadata"></audio>

  <script>
    class MusicPlayer {
      constructor() {
        this.songs = [];
        this.currentIndex = 0;
        this.isShuffled = false;
        
        this.initializeDOM();
        this.bindEvents();
        this.loadLastSession();
        this.registerServiceWorker();
      }

      initializeDOM() {
        this.playlist = document.getElementById('playlist');
        this.audio = document.getElementById('audio');
        this.playBtn = document.getElementById('playBtn');
        this.prevBtn = document.getElementById('prevBtn');
        this.nextBtn = document.getElementById('nextBtn');
        this.progress = document.getElementById('progress');
        this.currentTimeEl = document.getElementById('currentTime');
        this.durationEl = document.getElementById('duration');
        this.nowTitle = document.getElementById('nowTitle');
        this.songCount = document.getElementById('songCount');
        this.pickFolderBtn = document.getElementById('pickFolder');
      }

      bindEvents() {
        this.playBtn.addEventListener('click', () => this.togglePlay());
        this.nextBtn.addEventListener('click', () => this.playNext());
        this.prevBtn.addEventListener('click', () => this.playPrevious());
        this.progress.addEventListener('input', () => this.seek());
        this.audio.addEventListener('timeupdate', () => this.updateProgress());
        this.audio.addEventListener('ended', () => this.playNext());
        this.audio.addEventListener('loadedmetadata', () => this.updateDuration());
        this.pickFolderBtn.addEventListener('click', () => this.pickFolder());
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
          if (e.code === 'Space' && e.target === document.body) {
            e.preventDefault();
            this.togglePlay();
          } else if (e.code === 'ArrowRight' && e.ctrlKey) {
            e.preventDefault();
            this.playNext();
          } else if (e.code === 'ArrowLeft' && e.ctrlKey) {
            e.preventDefault();
            this.playPrevious();
          }
        });
      }

      async pickFolder() {
        try {
          const dirHandle = await window.showDirectoryPicker();
          this.songs = [];

          for await (const entry of dirHandle.values()) {
            if (entry.kind === 'file' && this.isAudioFile(entry.name)) {
              const file = await entry.getFile();
              this.songs.push({
                file,
                name: file.name.replace(/\.[^/.]+$/, ''),
                fullName: file.name,
                size: file.size,
                lastModified: file.lastModified
              });
            }
          }

          if (this.songs.length === 0) {
            this.showEmptyState('No music files found in this folder.');
            return;
          }

          this.songs.sort((a, b) => a.name.localeCompare(b.name));
          this.renderSongs();
          this.saveSession();
          
        } catch (err) {
          if (err.name !== 'AbortError') {
            console.error('Error loading folder:', err);
            alert('Unable to load folder. Please try again.');
          }
        }
      }

      isAudioFile(filename) {
        const audioExtensions = ['.mp3', '.wav', '.m4a', '.ogg', '.flac', '.aac'];
        return audioExtensions.some(ext => filename.toLowerCase().endsWith(ext));
      }

      renderSongs() {
        this.playlist.innerHTML = '';
        this.songCount.textContent = `${this.songs.length} song${this.songs.length !== 1 ? 's' : ''}`;

        this.songs.forEach((song, index) => {
          const item = document.createElement('div');
          item.className = `song ${index === this.currentIndex ? 'active' : ''}`;
          item.setAttribute('role', 'button');
          item.setAttribute('tabindex', '0');
          item.setAttribute('aria-label', `Play ${song.name}`);
          
          item.innerHTML = `
            <div class="art">
              <i class="fa-solid fa-music"></i>
            </div>
            <div class="song-info">
              <div class="song-name" title="${song.name}">${song.name}</div>
              <div class="song-sub">${this.formatFileSize(song.size)}</div>
            </div>
            <button class="song-play" aria-label="Play ${song.name}">
              <i class="fa-solid fa-play"></i>
            </button>
          `;

          item.addEventListener('click', () => this.playSong(index));
          item.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              this.playSong(index);
            }
          });
          
          this.playlist.appendChild(item);
        });
      }

      playSong(index) {
        if (index < 0 || index >= this.songs.length) return;
        
        this.currentIndex = index;
        const song = this.songs[index];
        
        if (this.audio.src) {
          URL.revokeObjectURL(this.audio.src);
        }
        
        this.audio.src = URL.createObjectURL(song.file);
        this.audio.load();
        
        this.nowTitle.textContent = song.name;
        document.title = `🎵 ${song.name} - Pulse Music`;
        
        this.audio.play()
          .then(() => {
            this.updatePlayButton(true);
            this.updateActiveSong();
          })
          .catch(err => {
            console.error('Playback failed:', err);
            this.updatePlayButton(false);
          });
      }

      togglePlay() {
        if (!this.audio.src) return;
        
        if (this.audio.paused) {
          this.audio.play();
          this.updatePlayButton(true);
        } else {
          this.audio.pause();
          this.updatePlayButton(false);
        }
      }

      updatePlayButton(isPlaying) {
        this.playBtn.innerHTML = isPlaying 
          ? '<i class="fa-solid fa-pause"></i>' 
          : '<i class="fa-solid fa-play"></i>';
        this.playBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
      }

      playNext() {
        if (this.songs.length === 0) return;
        this.currentIndex = (this.currentIndex + 1) % this.songs.length;
        this.playSong(this.currentIndex);
      }

      playPrevious() {
        if (this.songs.length === 0) return;
        this.currentIndex = (this.currentIndex - 1 + this.songs.length) % this.songs.length;
        this.playSong(this.currentIndex);
      }

      updateActiveSong() {
        const allSongs = document.querySelectorAll('.song');
        allSongs.forEach((song, index) => {
          song.classList.toggle('active', index === this.currentIndex);
        });
      }

      seek() {
        const seekTime = (this.progress.value / 100) * this.audio.duration;
        this.audio.currentTime = seekTime;
      }

      updateProgress() {
        if (this.audio.duration) {
          this.progress.value = (this.audio.currentTime / this.audio.duration) * 100;
          this.currentTimeEl.textContent = this.formatTime(this.audio.currentTime);
        }
      }

      updateDuration() {
        this.durationEl.textContent = this.formatTime(this.audio.duration);
      }

      formatTime(seconds) {
        if (isNaN(seconds) || !isFinite(seconds)) return '0:00';
        
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${mins}:${secs}`;
      }

      formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
      }

      showEmptyState(message) {
        this.playlist.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-folder-open"></i>
            <p>${message}</p>
          </div>
        `;
        this.songCount.textContent = '';
      }

      saveSession() {
        try {
          const sessionData = {
            currentIndex: this.currentIndex,
            currentTime: this.audio.currentTime
          };
          localStorage.setItem('pulseMusicSession', JSON.stringify(sessionData));
        } catch (e) {
          // Storage might not be available
        }
      }

      loadLastSession() {
        try {
          const savedSession = localStorage.getItem('pulseMusicSession');
          if (savedSession) {
            const { currentIndex, currentTime } = JSON.parse(savedSession);
            if (this.songs[currentIndex]) {
              this.playSong(currentIndex);
              this.audio.currentTime = currentTime || 0;
            }
          }
        } catch (e) {
          // Ignore loading errors
        }
      }

      registerServiceWorker() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./service-worker.js')
            .then(registration => {
              console.log('Service Worker registered:', registration.scope);
            })
            .catch(err => {
              console.log('Service Worker registration failed:', err);
            });
        }
      }
    }

    // Initialize the app
    const player = new MusicPlayer();
  </script>
</body>
</html>
