<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="Pulse Music - Modern offline music player" />

  <title>Pulse Music</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0a0f;
      --card:rgba(255,255,255,0.06);
      --card2:rgba(255,255,255,0.08);
      --text:#fff;
      --muted:rgba(255,255,255,0.6);
      --green:#22c55e;
      --green2:#16a34a;
      --border:rgba(255,255,255,0.08);
      --shadow:0 20px 60px rgba(0,0,0,0.5);
    }

    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

    body{
      background: radial-gradient(circle at top, #111827, #0a0a0f 60%);
      color:var(--text);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }

    .app{
      max-width:900px;
      margin:auto;
      padding-bottom:180px;
    }

    /* TOP BAR */
    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:blur(20px);
      background:rgba(10,10,15,0.7);
      border-bottom:1px solid var(--border);
      padding:18px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .brand h1{
      font-size:1.4rem;
      font-weight:700;
      letter-spacing:-0.5px;
    }

    .brand span{
      font-size:0.8rem;
      color:var(--muted);
    }

    .btn{
      width:48px;height:48px;
      border-radius:14px;
      border:none;
      cursor:pointer;
      color:white;
      background:linear-gradient(135deg,var(--green),var(--green2));
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 30px rgba(34,197,94,0.3);
      transition:0.2s;
    }

    .btn:active{transform:scale(0.95);}

    /* HERO */
    .hero{
      padding:20px;
    }

    .hero-card{
      padding:24px;
      border-radius:22px;
      background:linear-gradient(135deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));
      border:1px solid var(--border);
      box-shadow:var(--shadow);
    }

    .hero-card h2{
      font-size:1.7rem;
      margin-bottom:8px;
    }

    .hero-card p{
      color:var(--muted);
      font-size:0.95rem;
      line-height:1.5;
    }

    /* LIST */
    .section-title{
      padding:0 20px;
      margin-top:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .section-title h3{
      font-size:1rem;
      color:var(--muted);
      font-weight:600;
    }

    .playlist{
      padding:15px 20px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .song{
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px;
      border-radius:18px;
      background:var(--card);
      border:1px solid var(--border);
      cursor:pointer;
      transition:0.2s;
    }

    .song:hover{
      background:var(--card2);
      transform:translateX(4px);
    }

    .song.active{
      border:1px solid rgba(34,197,94,0.5);
      background:rgba(34,197,94,0.1);
    }

    .icon{
      width:48px;
      height:48px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--green),var(--green2));
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .song-info{
      flex:1;
      overflow:hidden;
    }

    .song-info h4{
      font-size:0.95rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .song-info small{
      color:var(--muted);
      font-size:0.75rem;
    }

    /* PLAYER */
    .player{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      max-width:900px;
      margin:auto;
      background:rgba(10,10,15,0.9);
      backdrop-filter:blur(25px);
      border-top:1px solid var(--border);
      padding:16px 18px;
      box-shadow:0 -10px 40px rgba(0,0,0,0.4);
    }

    .now{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .now h4{
      font-size:0.95rem;
      font-weight:600;
    }

    .now span{
      font-size:0.8rem;
      color:var(--muted);
    }

    .controls{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:18px;
      margin-top:10px;
    }

    .cbtn{
      width:48px;
      height:48px;
      border-radius:50%;
      border:none;
      background:rgba(255,255,255,0.08);
      color:white;
      cursor:pointer;
    }

    .play{
      width:64px;
      height:64px;
      background:linear-gradient(135deg,var(--green),var(--green2));
      box-shadow:0 10px 30px rgba(34,197,94,0.35);
    }

    .empty{
      text-align:center;
      padding:60px 20px;
      color:var(--muted);
    }
  </style>
</head>

<body>

<div class="app">

  <header class="topbar">
    <div class="brand">
      <h1>🎵 Pulse Music</h1>
      <span>Offline Player</span>
    </div>

    <button class="btn" id="pickFolder">
      <i class="fa-solid fa-folder-open"></i>
    </button>
  </header>

  <section class="hero">
    <div class="hero-card">
      <h2>Feel Your Music</h2>
      <p>Select a folder and enjoy a smooth offline listening experience built for mobile.</p>
    </div>
  </section>

  <div class="section-title">
    <h3>Your Library</h3>
  </div>

  <div class="playlist" id="playlist">
    <div class="empty">No songs loaded yet</div>
  </div>

</div>

<!-- PLAYER -->
<footer class="player">
  <div class="now">
    <h4 id="title">Nothing playing</h4>
    <span>Pulse</span>
  </div>

  <div class="controls">
    <button class="cbtn" id="prev"><i class="fa-solid fa-backward"></i></button>
    <button class="cbtn play" id="play"><i class="fa-solid fa-play"></i></button>
    <button class="cbtn" id="next"><i class="fa-solid fa-forward"></i></button>
  </div>
</footer>

<audio id="audio"></audio>

<script>
class Player {
  constructor(){
    this.songs=[];
    this.i=0;

    this.audio=document.getElementById("audio");
    this.list=document.getElementById("playlist");
    this.title=document.getElementById("title");

    this.bind();
  }

  bind(){
    document.getElementById("pickFolder").onclick=()=>this.pick();
    document.getElementById("play").onclick=()=>this.toggle();
    document.getElementById("next").onclick=()=>this.next();
    document.getElementById("prev").onclick=()=>this.prev();
  }

  async pick(){
    const dir=await window.showDirectoryPicker();
    this.songs=[];

    for await(const f of dir.values()){
      if(f.kind==="file"){
        const file=await f.getFile();
        if(file.type.startsWith("audio")){
          this.songs.push({file,name:file.name});
        }
      }
    }

    this.render();
  }

  render(){
    this.list.innerHTML="";

    this.songs.forEach((s,i)=>{
      const d=document.createElement("div");
      d.className="song";
      d.innerHTML=`
        <div class="icon"><i class="fa-solid fa-music"></i></div>
        <div class="song-info">
          <h4>${s.name}</h4>
          <small>Tap to play</small>
        </div>
      `;
      d.onclick=()=>this.play(i);
      this.list.appendChild(d);
    });
  }

  play(i){
    this.i=i;
    const s=this.songs[i];

    this.audio.src=URL.createObjectURL(s.file);
    this.audio.play();

    this.title.textContent=s.name;
  }

  toggle(){
    this.audio.paused?this.audio.play():this.audio.pause();
  }

  next(){
    this.play((this.i+1)%this.songs.length);
  }

  prev(){
    this.play((this.i-1+this.songs.length)%this.songs.length);
  }
}

new Player();

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
