<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="Pulse Music Offline Player" />

  <title>Pulse Music</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0a0f;
      --card:rgba(255,255,255,0.06);
      --card2:rgba(255,255,255,0.1);
      --text:#fff;
      --muted:rgba(255,255,255,0.6);
      --green:#22c55e;
      --green2:#16a34a;
      --border:rgba(255,255,255,0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

    body{
      background:radial-gradient(circle at top,#111827,#0a0a0f 60%);
      color:#fff;
      min-height:100vh;
    }

    .app{
      max-width:900px;
      margin:auto;
      padding-bottom:180px;
    }

    /* TOP */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px;
      position:sticky;
      top:0;
      background:rgba(10,10,15,0.7);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }

    .btn{
      width:48px;
      height:48px;
      border-radius:14px;
      border:none;
      cursor:pointer;
      background:linear-gradient(135deg,var(--green),var(--green2));
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* HERO */
    .hero{
      padding:20px;
    }

    .hero-card{
      padding:22px;
      border-radius:20px;
      background:rgba(255,255,255,0.06);
      border:1px solid var(--border);
    }

    /* LIST */
    .playlist{
      padding:15px 20px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .song{
      display:flex;
      gap:12px;
      align-items:center;
      padding:14px;
      border-radius:16px;
      background:var(--card);
      border:1px solid var(--border);
      cursor:pointer;
      transition:0.2s;
    }

    .song:hover{background:var(--card2);}

    .icon{
      width:46px;
      height:46px;
      border-radius:14px;
      background:linear-gradient(135deg,var(--green),var(--green2));
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .song-info h4{
      font-size:0.95rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .song-info small{
      color:var(--muted);
      font-size:0.75rem;
    }

    /* PLAYER */
    .player{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      max-width:900px;
      margin:auto;
      background:rgba(10,10,15,0.9);
      backdrop-filter:blur(20px);
      border-top:1px solid var(--border);
      padding:16px;
    }

    .controls{
      display:flex;
      justify-content:center;
      gap:18px;
      margin-top:10px;
    }

    .cbtn{
      width:50px;
      height:50px;
      border-radius:50%;
      border:none;
      background:rgba(255,255,255,0.08);
      color:white;
    }

    .play{
      width:64px;
      height:64px;
      background:linear-gradient(135deg,var(--green),var(--green2));
    }

    .empty{
      text-align:center;
      padding:60px 20px;
      color:var(--muted);
    }
  </style>
</head>

<body>

<div class="app">

  <!-- TOP -->
  <div class="topbar">
    <h3>🎵 Pulse Music</h3>

    <button class="btn" id="importBtn">
      <i class="fa-solid fa-folder-open"></i>
    </button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-card">
      <h2>Offline Music Library</h2>
      
    </div>
  </div>

  <!-- LIST -->
  <div class="playlist" id="playlist"></div>

</div>

<!-- PLAYER -->
<div class="player">
  <div id="title">Nothing playing</div>

  <div class="controls">
    <button class="cbtn" id="prev"><i class="fa-solid fa-backward"></i></button>
    <button class="cbtn play" id="play"><i class="fa-solid fa-play"></i></button>
    <button class="cbtn" id="next"><i class="fa-solid fa-forward"></i></button>
  </div>
</div>

<audio id="audio"></audio>

<script>class Player {
  constructor(){
    this.dbName="pulse-db";
    this.storeSongs="songs";
    this.storeLists="playlists";

    this.songs=[];
    this.playlists=[];
    this.current=0;
    this.currentList="all";

    this.audio=document.getElementById("audio");
    this.list=document.getElementById("playlist");
    this.title=document.getElementById("title");

    this.init();
    this.bind();
  }

  async init(){
    await this.loadAll();
    await this.loadPlaylists();
  }

  bind(){
    document.getElementById("importBtn").onclick=()=>this.importSongs();
    document.getElementById("play").onclick=()=>this.toggle();
    document.getElementById("next").onclick=()=>this.next();
    document.getElementById("prev").onclick=()=>this.prev();

    this.addSearchUI();
    this.addPlaylistUI();
  }

  /* ---------------- DB ---------------- */
  db(){
    return new Promise((res,rej)=>{
      const req=indexedDB.open(this.dbName,2);

      req.onupgradeneeded=()=>{
        const db=req.result;

        if(!db.objectStoreNames.contains(this.storeSongs)){
          db.createObjectStore(this.storeSongs,{keyPath:"id",autoIncrement:true});
        }

        if(!db.objectStoreNames.contains(this.storeLists)){
          db.createObjectStore(this.storeLists,{keyPath:"name"});
        }
      };

      req.onsuccess=()=>res(req.result);
      req.onerror=()=>rej(req.error);
    });
  }

  /* ---------------- IMPORT ---------------- */
  async importSongs(){
    const dir=await window.showDirectoryPicker();

    for await(const f of dir.values()){
      if(f.kind==="file"){
        const file=await f.getFile();

        if(file.type.startsWith("audio")){
          await this.saveSong(file);
        }
      }
    }

    await this.loadAll();
  }

  async saveSong(file){
    const db=await this.db();
    const tx=db.transaction(this.storeSongs,"readwrite");

    tx.objectStore(this.storeSongs).put({
      name:file.name,
      blob:await file.arrayBuffer(),
      type:file.type,
      playlists:[]
    });
  }

  /* ---------------- LOAD SONGS ---------------- */
  async loadAll(){
    const db=await this.db();
    const tx=db.transaction(this.storeSongs,"readonly");

    const req=tx.objectStore(this.storeSongs).getAll();

    req.onsuccess=()=>{
      this.songs=req.result;
      this.render();
    };
  }

  /* ---------------- PLAYLISTS ---------------- */
  async loadPlaylists(){
    const db=await this.db();
    const tx=db.transaction(this.storeLists,"readonly");

    const req=tx.objectStore(this.storeLists).getAll();

    req.onsuccess=()=>{
      this.playlists=req.result || [];
      this.renderPlaylistBar();
    };
  }

  async savePlaylist(name){
    const db=await this.db();
    const tx=db.transaction(this.storeLists,"readwrite");

    tx.objectStore(this.storeLists).put({
      name,
      songs:[]
    });

    await this.loadPlaylists();
  }

  /* ---------------- SEARCH ---------------- */
  filterSongs(query){
    if(!query) return this.songs;

    return this.songs.filter(s=>
      s.name.toLowerCase().includes(query.toLowerCase())
    );
  }

  addSearchUI(){
    const search=document.createElement("input");
    search.placeholder="Search songs...";
    search.style.cssText=`
      width:90%;
      margin:10px 20px;
      padding:12px;
      border-radius:12px;
      border:none;
      outline:none;
      background:rgba(255,255,255,0.08);
      color:white;
    `;

    search.oninput=()=>{
      this.render(search.value);
    };

    document.querySelector(".hero").appendChild(search);
  }

  /* ---------------- PLAYLIST UI ---------------- */
  addPlaylistUI(){
    const bar=document.createElement("div");

    bar.innerHTML=`
      <div style="display:flex;gap:10px;align-items:center;padding:0 20px;margin-top:10px;">
        <button id="newList" class="btn">+</button>
        <select id="listSelect" style="padding:10px;border-radius:10px;">
          <option value="all">All Songs</option>
        </select>
      </div>
    `;

    document.querySelector(".app").insertBefore(bar, this.list);

    document.getElementById("newList").onclick=()=>{
      const name=prompt("Playlist name?");
      if(name) this.savePlaylist(name);
    };

    document.getElementById("listSelect").onchange=(e)=>{
      this.currentList=e.target.value;
      this.render();
    };
  }

  renderPlaylistBar(){
    const select=document.getElementById("listSelect");

    select.innerHTML=`<option value="all">All Songs</option>`;

    this.playlists.forEach(p=>{
      const opt=document.createElement("option");
      opt.value=p.name;
      opt.textContent=p.name;
      select.appendChild(opt);
    });
  }

  /* ---------------- FILTER BY PLAYLIST ---------------- */
  getFilteredSongs(query){
    let list=this.filterSongs(query);

    if(this.currentList!=="all"){
      list=list.filter(s=>
        s.playlists?.includes(this.currentList)
      );
    }

    return list;
  }

  /* ---------------- RENDER ---------------- */
  render(query=""){
    this.list.innerHTML="";

    const songs=this.getFilteredSongs(query);

    if(!songs.length){
      this.list.innerHTML=`<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.5)">No songs found</div>`;
      return;
    }

    songs.forEach((s,i)=>{
      const d=document.createElement("div");
      d.className="song";

      d.innerHTML=`
        <div class="icon"><i class="fa-solid fa-music"></i></div>
        <div class="song-info">
          <h4>${s.name}</h4>
          <small>Tap to play</small>
        </div>
      `;

      d.onclick=()=>this.play(i);
      this.list.appendChild(d);
    });

    this.filtered=songs;
  }

  /* ---------------- PLAY ---------------- */
  play(i){
    this.current=i;

    const s=this.filtered ? this.filtered[i] : this.songs[i];

    const blob=new Blob([s.blob],{type:s.type});
    const url=URL.createObjectURL(blob);

    this.audio.src=url;
    this.audio.play();

    this.title.textContent=s.name;
  }

  toggle(){
    this.audio.paused?this.audio.play():this.audio.pause();
  }

  next(){
    if(!this.filtered?.length) return;
    this.play((this.current+1)%this.filtered.length);
  }

  prev(){
    if(!this.filtered?.length) return;
    this.play((this.current-1+this.filtered.length)%this.filtered.length);
  }
}

new Player();</script>

</body>
</html>
